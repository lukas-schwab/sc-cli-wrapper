services:
  api:
    build:
      context: .
      args:
        - SC_VERSION=latest
    ports:
      - "8000:8000"
    volumes:
      # Persist the Scalable CLI configuration and session
      # This ensures you don't have to log in every time the container restarts
      - config:/root/.config/scalable-cli
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  config:
